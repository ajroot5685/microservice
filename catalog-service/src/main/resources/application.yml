server:
  port: 0

spring:
  application:
    name: catalog-service
  threads:
    virtual:
      enabled: false
  datasource:
    url: jdbc:mysql://localhost:3312/catalog_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: catalog12
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka